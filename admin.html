<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIP Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #0a0a0a; --white: #f5f5f0; --accent: #ff3c00; --muted: #2a2a2a; --gray: #888; --card-bg: #141414; --green: #1a7a1a; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; border-bottom: 1px solid #1f1f1f; background: rgba(10,10,10,0.95); position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 4px; }
  .logo span { color: var(--accent); }
  .admin-badge { background: var(--accent); color: white; font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; padding: 3px 10px; text-transform: uppercase; }
  .store-link { color: var(--gray); font-size: 0.8rem; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; }
  .store-link:hover { color: var(--white); }
  .tabs { display: flex; border-bottom: 1px solid #1f1f1f; padding: 0 2.5rem; background: #0d0d0d; }
  .tab { padding: 1rem 1.5rem; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--gray); border-bottom: 2px solid transparent; transition: all 0.2s; font-weight: 500; }
  .tab.active { color: var(--white); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--white); }
  .container { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }
  .panel { display: none; }
  .panel.active { display: block; }
  /* Products panel */
  .add-form { background: var(--card-bg); padding: 2rem; margin-bottom: 2.5rem; border: 1px solid #222; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 1.5rem; color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group label { font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); }
  .form-group input, .form-group select { background: #1a1a1a; border: 1px solid #333; color: var(--white); padding: 0.7rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: #1a1a1a; }
  .submit-btn { background: var(--accent); color: white; border: none; padding: 0.85rem 2rem; font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
  .count-tag { font-size: 0.8rem; font-family: 'Inter', sans-serif; color: var(--gray); font-weight: 400; letter-spacing: 0; }
  .products-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .product-row { background: var(--card-bg); border: 1px solid #222; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1.2rem; }
  .product-emoji { font-size: 1.8rem; min-width: 36px; text-align: center; }
  .product-details { flex: 1; }
  .product-row-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.15rem; }
  .product-row-meta { font-size: 0.75rem; color: var(--gray); }
  .product-row-price { font-size: 1rem; font-weight: 700; color: var(--accent); min-width: 55px; text-align: right; }
  .delete-btn { background: none; border: 1px solid #333; color: var(--gray); padding: 0.35rem 0.8rem; font-size: 0.72rem; cursor: pointer; letter-spacing: 1px; font-family: 'Inter', sans-serif; transition: all 0.2s; text-transform: uppercase; }
  .delete-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* Orders panel */
  .orders-list { display: flex; flex-direction: column; gap: 1rem; }
  .order-card { background: var(--card-bg); border: 1px solid #222; padding: 1.5rem; }
  .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #1f1f1f; flex-wrap: wrap; gap: 0.5rem; }
  .order-id { font-size: 0.7rem; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.3rem; }
  .order-customer { font-weight: 600; font-size: 0.95rem; }
  .order-contact { font-size: 0.8rem; color: var(--gray); margin-top: 0.2rem; }
  .order-total { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .order-items { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .order-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: var(--gray); }
  .order-item span:first-child { font-size: 1.1rem; }
  .order-item strong { color: var(--white); }
  .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  .order-address { font-size: 0.78rem; color: var(--gray); }
  .status-select { background: #1a1a1a; border: 1px solid #333; color: var(--white); padding: 0.4rem 0.8rem; font-family: 'Inter', sans-serif; font-size: 0.78rem; outline: none; cursor: pointer; }
  .status-select:focus { border-color: var(--accent); }
  .status-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; padding: 3px 8px; text-transform: uppercase; }
  .status-pending { background: #2a1a00; color: #ff9900; }
  .status-confirmed { background: #001a2a; color: #00aaff; }
  .status-shipped { background: #1a001a; color: #cc00ff; }
  .status-delivered { background: #001a00; color: #00cc44; }
  .empty-state { text-align: center; color: var(--gray); padding: 3rem; border: 1px dashed #333; font-size: 0.9rem; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--green); color: white; padding: 0.8rem 1.5rem; font-size: 0.82rem; font-weight: 600; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--accent); }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } header, .tabs { padding-left: 1.2rem; padding-right: 1.2rem; } .container { padding: 1.5rem 1.2rem; } }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:1rem;">
    <div class="logo">DR<span>I</span>P</div>
    <span class="admin-badge">Admin</span>
  </div>
  <a href="index.html" class="store-link">← Back to Store</a>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('products')">Products</div>
  <div class="tab" onclick="switchTab('orders')">Orders <span id="ordersBadge"></span></div>
</div>

<div class="container">
  <!-- PRODUCTS PANEL -->
  <div class="panel active" id="panel-products">
    <div class="add-form">
      <div class="form-title">Add New Product</div>
      <div class="form-grid">
        <div class="form-group"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. Oversized Hoodie"></div>
        <div class="form-group"><label>Category</label>
          <select id="pCategory"><option>Hoodie</option><option>T-Shirt</option><option>Bottoms</option><option>Jacket</option><option>Accessories</option><option>Shoes</option></select>
        </div>
        <div class="form-group"><label>Price (USD)</label><input type="number" id="pPrice" placeholder="e.g. 89" min="0"></div>
        <div class="form-group"><label>Emoji Icon</label><input type="text" id="pEmoji" placeholder="e.g. 🔥" maxlength="2"></div>
        <div class="form-group"><label>Badge (optional)</label>
          <select id="pBadge"><option value="">None</option><option>New</option><option>Hot</option><option>Sale</option><option>Limited</option></select>
        </div>
      </div>
      <button class="submit-btn" id="addBtn" onclick="addProduct()">Add Product</button>
    </div>
    <div class="section-label">All Products <span class="count-tag" id="productCount"></span></div>
    <div class="products-list" id="productsList"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- ORDERS PANEL -->
  <div class="panel" id="panel-orders">
    <div class="section-label" style="margin-bottom:1.5rem;">Orders <span class="count-tag" id="ordersCount"></span></div>
    <div class="orders-list" id="ordersList"><div class="empty-state">Loading orders...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB6vVf6o9aG6sQf2tZ-AkvDNkSDgavH6Ic",
    authDomain: "drip-store-838b7.firebaseapp.com",
    projectId: "drip-store-838b7",
    storageBucket: "drip-store-838b7.firebasestorage.app",
    messagingSenderId: "344998294552",
    appId: "1:344998294552:web:4b99b2c423241591447f6d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Products
  let products = [];
  onSnapshot(collection(db, 'products'), (snap) => {
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts();
    document.getElementById('productCount').textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;
  });

  function renderProducts() {
    const list = document.getElementById('productsList');
    if (!products.length) { list.innerHTML = '<div class="empty-state">No products yet. Add your first one above.</div>'; return; }
    list.innerHTML = products.map(p => `
      <div class="product-row">
        <div class="product-emoji">${p.emoji||'👕'}</div>
        <div class="product-details">
          <div class="product-row-name">${p.name} ${p.badge?`<span style="background:var(--accent);color:white;font-size:0.6rem;padding:2px 6px;font-weight:700;">${p.badge}</span>`:''}</div>
          <div class="product-row-meta">${p.category}</div>
        </div>
        <div class="product-row-price">$${p.price}</div>
        <button class="delete-btn" onclick="window.deleteProduct('${p.id}')">Delete</button>
      </div>`).join('');
  }

  window.addProduct = async () => {
    const name = document.getElementById('pName').value.trim();
    const category = document.getElementById('pCategory').value;
    const price = parseFloat(document.getElementById('pPrice').value);
    const emoji = document.getElementById('pEmoji').value.trim() || '👕';
    const badge = document.getElementById('pBadge').value || null;
    if (!name || !price) { showToast('Fill in name and price!', true); return; }
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = 'Adding...';
    try {
      await addDoc(collection(db, 'products'), { name, category, price, emoji, badge });
      ['pName','pPrice','pEmoji'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pBadge').value = '';
      showToast('Product added! 🔥');
    } catch(e) { showToast('Error adding product', true); }
    btn.disabled = false; btn.textContent = 'Add Product';
  };

  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product?')) return;
    try { await deleteDoc(doc(db, 'products', id)); showToast('Deleted'); }
    catch(e) { showToast('Error', true); }
  };

  // Orders
  let orders = [];
  const ordersQuery = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  onSnapshot(ordersQuery, (snap) => {
    orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderOrders();
    const count = orders.length;
    document.getElementById('ordersCount').textContent = `${count} order${count !== 1 ? 's' : ''}`;
    document.getElementById('ordersBadge').textContent = count > 0 ? `(${count})` : '';
  });

  function renderOrders() {
    const list = document.getElementById('ordersList');
    if (!orders.length) { list.innerHTML = '<div class="empty-state">No orders yet. Share your store link!</div>'; return; }
    list.innerHTML = orders.map(o => {
      const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('en-AE', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : 'Just now';
      const statusClass = `status-${o.status||'pending'}`;
      return `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">#${o.id.slice(-8).toUpperCase()} · ${date}</div>
            <div class="order-customer">${o.customer?.name || 'Unknown'}</div>
            <div class="order-contact">${o.customer?.email || ''} ${o.customer?.phone ? '· '+o.customer.phone : ''}</div>
          </div>
          <div class="order-total">$${o.total?.toFixed(2)}</div>
        </div>
        <div class="order-items">
          ${(o.items||[]).map(i => `<div class="order-item"><span>${i.emoji||'👕'}</span><strong>${i.name}</strong><span>x${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
        </div>
        <div class="order-footer">
          <div class="order-address">📍 ${o.customer?.address || 'No address'}</div>
          <select class="status-select" onchange="window.updateStatus('${o.id}', this.value)">
            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
          </select>
        </div>
      </div>`;
    }).join('');
  }

  window.updateStatus = async (id, status) => {
    try {
      await updateDoc(doc(db, 'orders', id), { status });
      showToast(`Status updated to ${status}`);
    } catch(e) { showToast('Error updating status', true); }
  };

  function showToast(msg, error=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['products','orders'][i] === tab));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
  };
</script>
</body>
</html>
